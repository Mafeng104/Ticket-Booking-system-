<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Ticket Booking System</title>

</head>

<body>

<div class="container">
    <h2>Reservation Booking System</h2>

    <p>Time Remaining:</p>
    <div id="timer">60</div>

    <form id="bookingForm">
        <input type="text" id="name" placeholder="Enter your name" required>
        <input type="number" id="name" placeholder="Enter your phone number" required>
        <input type="text" id="name" placeholder="Enter your residential address" required>
        <input type="date" id="name" placeholder="Enter your DOB" required>
        <input type="email" id="email" placeholder="Enter your email" required>
        <button type="submit" id="bookBtn">Book Ticket</button>
    </form>

    <div id="message"></div>
    <div id="status"></div>
</div>

<script>

    // Function to generate random background color
    function randomColor() {
        const colors = ["#f4f4f4", "#dff9fb", "#f6e58d", "#c7ecee", "#ffcccc"];
        return colors[Math.floor(Math.random() * colors.length)];
    }

    // Set random color when page loads
    document.body.style.backgroundColor = randomColor();

    let timeLeft = 60;
    const timerDisplay = document.getElementById("timer");
    const form = document.getElementById("bookingForm");
    const bookBtn = document.getElementById("bookBtn");
    const message = document.getElementById("message");
    const status = document.getElementById("status");

    // Countdown Timer
    const countdown = setInterval(function () {

        timeLeft--;
        timerDisplay.textContent = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(countdown);

            bookBtn.disabled = true;
            status.textContent = "Booking Closed";
            document.body.style.backgroundColor = "red,blue,green";
            timerDisplay.textContent = "0";
        }

    }, 1000);


    // Form Submission
    form.addEventListener("submit", function (e) {

        e.preventDefault(); // Prevent page reload

        if (timeLeft > 0) {

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();

            if (name === "" || email === "") {
                message.textContent = "Please fill all fields.";
                message.style.color = "red";
                return;
            }

            message.textContent = "✅ Ticket booked successfully for " + name + "!";
            message.style.color = "green";

            clearInterval(countdown); // stop timer

            // Reload page after 3 seconds with new background color
            setTimeout(function () {
                location.reload();
            }, 3000);

        } else {
            message.textContent = "Booking time has expired.";
            message.style.color = "red";
        }

    });
    //HND/CSS/2024/0372
    //Davou Mafeng Dung

</script>

</body>
</html>
